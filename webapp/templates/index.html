<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creditsafe SOC - Tabletop Exercise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' } } } } }
    </script>
</head>
<body class="bg-gray-950 text-gray-300 h-screen flex flex-col items-center justify-center font-sans">
    <div class="text-center mb-12">
        <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center font-bold text-white text-2xl mx-auto mb-6 shadow-lg shadow-blue-900/50">CS</div>
        <h1 class="text-4xl font-bold text-white mb-2 tracking-tight">Creditsafe SOC Tabletop</h1>
        <p class="text-gray-500">Incident INC-20260528-0042</p>
    </div>

    <div class="grid grid-cols-2 gap-6 max-w-4xl w-full px-6">
        <!-- Team 1 -->
        <a href="/dashboard/team1" class="group block bg-gray-900 border border-gray-800 hover:border-blue-500 rounded-xl p-8 transition-all hover:-translate-y-1 hover:shadow-xl hover:shadow-blue-900/20">
            <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-blue-400 transition-colors">{{ teams.team1.name }}</h2>
            <p class="text-gray-500">Enter the analyst dashboard as Team Alpha. Classify alerts and investigate.</p>
        </a>

        <!-- Team 2 -->
        <a href="/dashboard/team2" class="group block bg-gray-900 border border-gray-800 hover:border-purple-500 rounded-xl p-8 transition-all hover:-translate-y-1 hover:shadow-xl hover:shadow-purple-900/20">
            <h2 class="text-2xl font-bold text-white mb-2 group-hover:text-purple-400 transition-colors">{{ teams.team2.name }}</h2>
            <p class="text-gray-500">Enter the analyst dashboard as Team Bravo. Classify alerts and investigate.</p>
        </a>
    </div>

    <div class="flex gap-4 mt-12">
        <a href="/leaderboard" class="text-sm font-medium text-gray-400 hover:text-white bg-gray-900 px-4 py-2 rounded-lg border border-gray-800 transition-colors">View Leaderboard</a>
        <a href="/facilitator" class="text-sm font-medium text-gray-400 hover:text-white bg-gray-900 px-4 py-2 rounded-lg border border-gray-800 transition-colors">Facilitator Controls</a>
    </div>
</body>
</html>
